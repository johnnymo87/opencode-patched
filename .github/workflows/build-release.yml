name: Build and Release Patched OpenCode

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenCode version to build (without v prefix, e.g., 1.2.27)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: write
  issues: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout opencode-patched
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Clone upstream opencode
        run: |
          git clone --depth 1 --branch v${{ inputs.version }} \
            https://github.com/anomalyco/opencode.git opencode-src
          cd opencode-src
          echo "Cloned opencode v${{ inputs.version }}"
          git log -1 --oneline

      - name: Apply patches (caching + vim)
        run: |
          cd opencode-src
          ../patches/apply.sh .

      - name: Install dependencies
        run: |
          cd opencode-src
          bun install

      - name: Build CLI
        run: |
          cd opencode-src/packages/opencode
          bun run script/build.ts --all

          echo ""
          echo "Build completed. Artifacts:"
          ls -lh dist/
        env:
          OPENCODE_VERSION: ${{ inputs.version }}

      - name: Extract Linux arm64 binary
        run: |
          cd opencode-src/packages/opencode/dist/opencode-linux-arm64
          tar czf /tmp/opencode-linux-arm64.tar.gz .
          echo "Created: $(ls -lh /tmp/opencode-linux-arm64.tar.gz)"

      - name: Extract Linux x64 binary
        run: |
          cd opencode-src/packages/opencode/dist/opencode-linux-x64
          tar czf /tmp/opencode-linux-x64.tar.gz .
          echo "Created: $(ls -lh /tmp/opencode-linux-x64.tar.gz)"

      - name: Upload Linux arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-linux-arm64
          path: /tmp/opencode-linux-arm64.tar.gz
          retention-days: 1

      - name: Upload Linux x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-linux-x64
          path: /tmp/opencode-linux-x64.tar.gz
          retention-days: 1

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout opencode-patched
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Clone upstream opencode
        run: |
          git clone --depth 1 --branch v${{ inputs.version }} \
            https://github.com/anomalyco/opencode.git opencode-src
          cd opencode-src
          echo "Cloned opencode v${{ inputs.version }}"
          git log -1 --oneline

      - name: Apply patches (caching + vim)
        run: |
          cd opencode-src
          ../patches/apply.sh .

      - name: Install dependencies
        run: |
          cd opencode-src
          bun install

      - name: Build CLI
        run: |
          cd opencode-src/packages/opencode
          bun run script/build.ts --all

          echo ""
          echo "Build completed. Artifacts:"
          ls -lh dist/
        env:
          OPENCODE_VERSION: ${{ inputs.version }}

      - name: Extract macOS arm64 binary
        run: |
          cd opencode-src/packages/opencode/dist/opencode-darwin-arm64
          zip -r /tmp/opencode-darwin-arm64.zip .
          echo "Created: $(ls -lh /tmp/opencode-darwin-arm64.zip)"

      - name: Extract macOS x64 binary
        run: |
          cd opencode-src/packages/opencode/dist/opencode-darwin-x64
          zip -r /tmp/opencode-darwin-x64.zip .
          echo "Created: $(ls -lh /tmp/opencode-darwin-x64.zip)"

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-darwin-arm64
          path: /tmp/opencode-darwin-arm64.zip
          retention-days: 1

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-darwin-x64
          path: /tmp/opencode-darwin-x64.zip
          retention-days: 1

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip > checksums.sha256
          cat checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}-patched
          name: OpenCode v${{ inputs.version }} with Caching + Vim
          body: |
            # OpenCode v${{ inputs.version }} with Caching + Vim Keybindings

            This release applies two patches to OpenCode v${{ inputs.version }}:

            1. **Prompt caching improvements** from [PR #5422](https://github.com/anomalyco/opencode/pull/5422) (via [opencode-cached](https://github.com/johnnymo87/opencode-cached))
            2. **Vim keybindings** from [PR #12679](https://github.com/anomalyco/opencode/pull/12679)

            ## Caching Improvements

            - Provider-specific cache configuration for 19+ providers
            - Improved cache breakpoint logic with `maxBreakpoints` support
            - ~44% reduction in cache writes, ~73% reduction in effective cost

            ## Vim Keybindings

            Enable with `tui.vim: true` in config or toggle from command palette. Disabled by default.

            - Mode switching: `i I a A o O S`, `cc`, `cw`, `Esc`
            - Motions: `h j k l`, `w b e`, `W B E`, `0 ^ $`
            - Deletes: `x`, `dd`, `dw`
            - Session navigation: `gg/G`
            - Scrolling: `Ctrl+e/y/d/u/f/b`
            - `Enter` in normal mode submits

            ## Installation

            ### Linux (arm64)
            ```bash
            curl -sL https://github.com/johnnymo87/opencode-patched/releases/download/v${{ inputs.version }}-patched/opencode-linux-arm64.tar.gz | tar xz
            ./bin/opencode --version
            ```

            ### Linux (x64)
            ```bash
            curl -sL https://github.com/johnnymo87/opencode-patched/releases/download/v${{ inputs.version }}-patched/opencode-linux-x64.tar.gz | tar xz
            ./bin/opencode --version
            ```

            ### macOS (arm64)
            ```bash
            curl -sL https://github.com/johnnymo87/opencode-patched/releases/download/v${{ inputs.version }}-patched/opencode-darwin-arm64.zip -o opencode.zip && unzip opencode.zip
            ./bin/opencode --version
            ```

            ### macOS (x64)
            ```bash
            curl -sL https://github.com/johnnymo87/opencode-patched/releases/download/v${{ inputs.version }}-patched/opencode-darwin-x64.zip -o opencode.zip && unzip opencode.zip
            ./bin/opencode --version
            ```

            ---

            **Upstream**: [anomalyco/opencode v${{ inputs.version }}](https://github.com/anomalyco/opencode/releases/tag/v${{ inputs.version }})
            **Caching patch**: [opencode-cached](https://github.com/johnnymo87/opencode-cached) / [PR #5422](https://github.com/anomalyco/opencode/pull/5422)
            **Vim patch**: [PR #12679](https://github.com/anomalyco/opencode/pull/12679)
          files: |
            artifacts/opencode-linux-arm64.tar.gz
            artifacts/opencode-linux-x64.tar.gz
            artifacts/opencode-darwin-arm64.zip
            artifacts/opencode-darwin-x64.zip
            artifacts/checksums.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-on-failure:
    needs: [build-linux, build-macos, release]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ inputs.version }}';
            const title = `Build failed for v${version}`;
            const body = `
            ## Build Failure: v${version}

            The automated build for OpenCode v${version} with caching + vim patches failed.

            **Workflow Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### Possible Causes

            1. **Caching patch conflict**: The caching patch (fetched from opencode-cached) may not apply to v${version}
            2. **Vim patch conflict**: The local vim.patch may not apply to v${version}
            3. **Build failure**: OpenCode build process may have changed

            ### Action Required

            1. Check the workflow logs above
            2. If caching patch failed, check [opencode-cached](https://github.com/johnnymo87/opencode-cached) for updates
            3. If vim patch failed, regenerate from [PR #12679](https://github.com/anomalyco/opencode/pull/12679):
               \`\`\`bash
               gh pr diff 12679 --repo anomalyco/opencode > patches/vim.patch
               # Review changes, filter if needed, commit and push
               \`\`\`
            4. Re-run: \`gh workflow run build-release.yml --field version=${version}\`
            `;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'build-failure'
            });

            const existingIssue = issues.data.find(i => i.title === title);

            if (existingIssue) {
              console.log(`Issue already exists: #${existingIssue.number}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `Another build failure occurred. See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['build-failure', 'automated']
              });
              console.log('Created issue: ' + title);
            }
